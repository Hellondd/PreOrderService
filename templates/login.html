<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | Система Предзаказов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
<div class="container text-center" style="max-width: 400px;">
    <h3 class="mb-4">Авторизация</h3>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form action="/login" method="POST" class="card p-4 shadow-sm">
        <input type="text" name="username" class="form-control mb-3" placeholder="Логин" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Пароль" required>
        <button type="submit" class="btn btn-primary w-100">Войти</button>
    </form>
    <div class="mt-3 text-muted small">
        <strong>Тестовые доступы:</strong><br>
        Админ: <code>admin</code> / <code>admin123</code><br>
        Клиент: <code>client</code> / <code>password123</code>
    </div>
</div>
</body>
</html>
